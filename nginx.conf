server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API 反向代理：正则匹配 + 变量 proxy_pass，确保 POST 被转发（不用 if，避免影响 proxy）
    # 角色/场景 图片生成请求体含 base64 图，需放宽 body 限制（默认 1m 易导致 502）
    location ~ ^/api-proxy/(.*)$ {
        client_max_body_size 50m;
        set $path $1;
        proxy_pass http://api.gitcc.com/$path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host api.gitcc.com;
        proxy_set_header Origin "http://api.gitcc.com";
        proxy_set_header Referer "http://api.gitcc.com/";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $http_content_type;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        add_header Access-Control-Allow-Origin $http_origin always;
    }

    # 处理前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 避免入口 HTML 被缓存导致更新不生效
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-cache" always;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
